<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ColaPig 每日掃描</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --bg-base: #0a0a0f;
      --bg-surface: #111118;
      --bg-elevated: #1a1a24;
      --border: #2a2a3a;
      --accent-buy: #ff4d6a;
      --accent-sell: #00e5a0;
      --accent-hold: #f0a030;
      --accent-gold: #f5c842;
    }
    body { background: var(--bg-base); color: #e0e0e0; font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; }
    .card { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 12px; }
    .regime-bull { color: #ff4d6a; }
    .regime-bear { color: #00e5a0; }
    .regime-flat { color: #f0a030; }
    .score-high { color: #f5c842; }
    .loading { animation: spin 1s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .fade-in { animation: fadeIn 0.3s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    .sell-alert { border-color: rgba(255, 77, 106, 0.3); }
  </style>
</head>
<body class="min-h-screen p-4 md:p-6">
  <div class="max-w-3xl mx-auto space-y-4">

    <!-- Header -->
    <div class="flex items-center justify-between">
      <div>
        <h1 class="text-xl font-bold text-[#00d4ff]">🏠 ColaPig 每日掃描</h1>
        <p class="text-xs text-gray-500" id="lastUpdate">等待更新...</p>
      </div>
      <div class="flex items-center gap-2">
        <span class="text-xs text-gray-500" id="clock">--:--:--</span>
        <button onclick="runSaveScript()" id="refreshBtn"
          class="bg-[#1a1a24] border border-[#2a2a3a] rounded-lg px-4 py-2 text-sm hover:bg-[#22222f] transition-colors flex items-center gap-2">
          <span id="refreshIcon">🔄</span>
          <span id="refreshText">更新資料</span>
        </button>
      </div>
    </div>

    <!-- How to use -->
    <div class="card p-3 border-[#00d4ff]/20 bg-[#00d4ff]/5">
      <p class="text-xs text-gray-400">
        💡 使用方式：先點「更新資料」按鈕抓取最新掃描結果。
        資料會儲存到 <code class="text-[#00d4ff]">data.json</code>，此頁面直接讀取靜態檔案，<strong>不需要開啟 API</strong>。
      </p>
    </div>

    <!-- Stock Search -->
    <div class="card p-3">
      <div class="flex gap-2">
        <input type="text" id="searchInput" placeholder="輸入股票代號，如 2330.TW"
          class="flex-1 bg-[#0a0a0f] border border-[#2a2a3a] rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-[#00d4ff]"
          onkeypress="if(event.key==='Enter')searchStock()">
        <button onclick="searchStock()"
          class="bg-[#00d4ff] text-black rounded-lg px-4 py-2 text-sm font-medium hover:bg-[#00b8e0] transition-colors">
          查詢個股
        </button>
      </div>
      <div id="searchResult" class="mt-3 hidden"></div>
    </div>

    <!-- Top 5 Candidates -->
    <div class="card p-4">
      <h2 class="text-sm font-semibold text-gray-400 mb-3">📊 買候選 Top 5</h2>
      <div id="candidates" class="space-y-2">
        <div class="text-gray-500 text-sm text-center py-4">請先點上方「更新資料」按鈕</div>
      </div>
    </div>

    <!-- Portfolio Status -->
    <div class="card p-4">
      <h2 class="text-sm font-semibold text-gray-400 mb-3" id="portfolioTitle">💼 持股狀態</h2>
      <div id="portfolio" class="space-y-2">
        <div class="text-gray-500 text-sm text-center py-4">請先點上方「更新資料」按鈕</div>
      </div>
    </div>

    <!-- Portfolio Sell Alerts -->
    <div class="card p-4 sell-alert hidden" id="sellAlertCard">
      <h2 class="text-sm font-semibold text-[#ff4d6a] mb-3">⚠️ 持股賣訊</h2>
      <div id="sellAlerts" class="space-y-2"></div>
    </div>

  </div>

  <script>
    const DATA_FILE = 'data.json';
    let portfolioTickers = new Set();

    // Clock
    function updateClock() {
      const now = new Date();
      document.getElementById('clock').textContent = now.toLocaleTimeString('zh-TW');
    }
    setInterval(updateClock, 1000);
    updateClock();

    // Regime
    function regimeInfo(regime) {
      switch (regime) {
        case '多頭': return { emoji: '🟢', cls: 'regime-bull' };
        case '空頭': return { emoji: '🔴', cls: 'regime-bear' };
        default: return { emoji: '🟡', cls: 'regime-flat' };
      }
    }

    function actionIcon(action) {
      if (!action) return '☕';
      if (action.includes('🔥')) return '🔥';
      if (action.includes('🧹')) return '🧹';
      if (action.includes('持有')) return '☕';
      return '☕';
    }

    function fmt(n, d = 2) {
      return typeof n === 'number' ? n.toFixed(d) : (n || '0');
    }

    // Load from data.json
    async function loadData() {
      const btn = document.getElementById('refreshBtn');
      const icon = document.getElementById('refreshIcon');
      const text = document.getElementById('refreshText');

      icon.classList.add('loading');
      icon.textContent = '⏳';
      text.textContent = '更新中...';
      btn.disabled = true;

      try {
        // Try to load local data.json
        const res = await fetch(DATA_FILE + '?t=' + Date.now());
        if (!res.ok) throw new Error('無法讀取 data.json');
        const data = await res.json();
        renderAll(data);
        document.getElementById('lastUpdate').textContent = `資料更新時間：${data.updated || '未知'}`;
      } catch (e) {
        document.getElementById('candidates').innerHTML =
          `<div class="text-center py-4 text-gray-400 text-sm">請先點「更新資料」按鈕抓取最新結果</div>`;
        document.getElementById('portfolio').innerHTML =
          `<div class="text-center py-4 text-gray-400 text-sm">請先點「更新資料」按鈕抓取最新結果</div>`;
      } finally {
        icon.classList.remove('loading');
        icon.textContent = '🔄';
        text.textContent = '更新資料';
        btn.disabled = false;
      }
    }

    // Call the Python script via a simple fetch to a local endpoint
    // Or redirect user to run it
    async function runSaveScript() {
      const btn = document.getElementById('refreshBtn');
      const icon = document.getElementById('refreshIcon');
      const text = document.getElementById('refreshText');
      icon.classList.add('loading');
      icon.textContent = '⏳';
      text.textContent = '更新中...';
      btn.disabled = true;

      // Show instruction
      document.getElementById('candidates').innerHTML =
        `<div class="text-center py-8">
          <div class="text-4xl mb-3">📡</div>
          <p class="text-gray-400 text-sm mb-2">請在同一台電腦上執行 Python 腳本</p>
          <p class="text-gray-500 text-xs">或在終端機執行：</p>
          <code class="block bg-[#0a0a0f] rounded-lg p-3 mt-2 text-xs text-[#00d4ff]">
            cd E:\\coding\\股票策略機器學習\\finance-buyable<br>
            .\\venv\\Scripts\\python.exe save_results.py
          </code>
          <p class="text-gray-500 text-xs mt-3">執行完成後，再回來點「更新資料」</p>
        </div>`;
      document.getElementById('portfolio').innerHTML = '';
      document.getElementById('sellAlertCard').classList.add('hidden');

      icon.classList.remove('loading');
      icon.textContent = '🔄';
      text.textContent = '更新資料';
      btn.disabled = false;
    }

    function renderAll(data) {
      renderCandidates(data.candidates || []);
      renderPortfolio(data.portfolio || []);
      renderSellAlerts(data.sell_alerts || []);
      portfolioTickers = new Set((data.portfolio || []).map(p => p.ticker.toUpperCase()));
    }

    function renderCandidates(candidates) {
      const el = document.getElementById('candidates');
      if (!candidates.length) {
        el.innerHTML = '<div class="text-gray-500 text-sm text-center py-4">今日無買候選</div>';
        return;
      }
      el.innerHTML = candidates.map((c, i) => `
        <div class="bg-[#1a1a24] rounded-lg p-3 flex items-center justify-between fade-in" style="animation-delay:${i*50}ms">
          <div class="flex items-center gap-3">
            <span class="text-lg font-bold text-gray-500">${i+1}</span>
            <span class="text-lg">${actionIcon(c.action)}</span>
            <div>
              <div class="font-medium">${c.ticker} ${c.name || ''}</div>
              <div class="text-xs text-gray-500">${c.regime} | DMPI: ${fmt(c.dmpi)} | RSI: ${fmt(c.rsi)}</div>
            </div>
          </div>
          <div class="text-right">
            <div class="score-high font-bold">${fmt(c.score, 1)}</div>
            <div class="text-xs text-gray-500">評分</div>
          </div>
        </div>`).join('');
    }

    function renderPortfolio(positions) {
      const el = document.getElementById('portfolio');
      if (!positions.length) {
        el.innerHTML = '<div class="text-gray-500 text-sm text-center py-4">目前沒有持股</div>';
        return;
      }
      el.innerHTML = positions.map((p, i) => {
        const ri = regimeInfo(p.regime || '盤整');
        const pnlColor = p.pnl >= 0 ? 'text-[#ff4d6a]' : 'text-[#00e5a0]';
        const pnlSign = p.pnl >= 0 ? '+' : '';
        return `
        <div class="bg-[#1a1a24] rounded-lg p-3 flex items-center justify-between fade-in ${p.has_sell ? 'border border-[#ff4d6a]/30' : ''}" style="animation-delay:${i*30}ms">
          <div class="flex items-center gap-3">
            <span class="text-lg">${ri.emoji}</span>
            <div>
              <div class="font-medium flex items-center gap-1">
                ${p.ticker} ${p.name || ''}
                ${p.has_sell ? '<span class="text-xs text-[#ff4d6a]">⚠️賣訊</span>' : ''}
              </div>
              <div class="text-xs text-gray-500">
                成本: ${fmt(p.cost)} | 現價: ${fmt(p.close)} | ${p.qty}張
              </div>
            </div>
          </div>
          <div class="text-right">
            <div class="${pnlColor} font-bold">${pnlSign}${fmt(p.pnl)}</div>
            <div class="text-xs text-gray-500">${pnlSign}${fmt(p.pnl_pct)}%</div>
          </div>
        </div>`;
      }).join('');
      document.getElementById('portfolioTitle').textContent = `💼 持股狀態（共 ${positions.length} 支）`;
    }

    function renderSellAlerts(alerts) {
      const card = document.getElementById('sellAlertCard');
      const el = document.getElementById('sellAlerts');
      if (!alerts.length) {
        card.classList.add('hidden');
        return;
      }
      card.classList.remove('hidden');
      el.innerHTML = alerts.map(s => `
        <div class="bg-[#ff4d6a]/10 border border-[#ff4d6a]/30 rounded-lg p-3 fade-in">
          <div class="flex items-center gap-2">
            <span class="text-lg">⚠️</span>
            <span class="font-medium">${s.ticker} ${s.name || ''}</span>
            <span class="text-xs text-[#ff4d6a]">${s.regime}</span>
          </div>
          <div class="text-xs text-gray-400 mt-1 pl-7">
            DMPI: ${fmt(s.dmpi)} | RSI: ${fmt(s.rsi)} | 現價: ${fmt(s.close)}
          </div>
        </div>`).join('');
    }

    // Individual stock search - needs API
    async function searchStock() {
      const input = document.getElementById('searchInput').value.trim().toUpperCase();
      if (!input) return;
      document.getElementById('searchResult').innerHTML =
        '<div class="text-center py-4 text-gray-400 text-sm">⚠️ 個股查詢需要啟動 API（python api/server.py）<br>請透過完整網頁版使用此功能</div>';
      document.getElementById('searchResult').classList.remove('hidden');
    }

    // Load data on page load
    window.addEventListener('load', loadData);
  </script>
</body>
</html>
